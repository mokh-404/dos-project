<VirtualHost *:80>
    ServerName victim-server
    ServerAlias www.victim-server
    DocumentRoot /var/www/html

    # ── Logging ──────────────────────────────────────────────
    CustomLog /var/log/apache2/access.log combined_forensic
    CustomLog /var/log/apache2/dos_analysis.log dos_analysis
    ErrorLog  /var/log/apache2/error.log
    LogLevel  warn

    # ── Directory Settings ────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Health Check Endpoint ────────────────────────────────
    <Location /health>
        SetHandler default-handler
        Require all granted
    </Location>

    # ── Apache Status (monitoring network only) ───────────────
    <Location /server-status>
        SetHandler server-status
        Require ip 172.0.0.0/8
        Require ip 127.0.0.1
    </Location>

    # ── Deny common attack patterns ──────────────────────────
    <IfModule mod_rewrite.c>
        RewriteEngine On
        # Block null user agents (basic bot filter for lab demo)
        RewriteCond %{HTTP_USER_AGENT} ^-?$ [OR]
        RewriteCond %{HTTP_USER_AGENT} ^$
        RewriteRule .* - [F,L]
    </IfModule>

    # ── Performance Headers ───────────────────────────────────
    <IfModule mod_headers.c>
        Header set X-Powered-By "DoS-Lab-Victim/1.0"
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </IfModule>
</VirtualHost>
