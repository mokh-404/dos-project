# ============================================================
# Apache2 Configuration — DoS Lab Victim Server
# Optimized for monitoring and performance analysis
# ============================================================

# Server identity
ServerRoot "/etc/apache2"
ServerName victim-server
ServerTokens Prod
ServerSignature Off

# Performance tuning — intentionally moderate limits to show
# degradation under load (for lab demonstration purposes)
# Performance tuning — INTENTIONALLY WEAK to demonstrate
# DoS impact. A real server would have more workers/resources.
Timeout 60
KeepAlive Off
MaxKeepAliveRequests 10
KeepAliveTimeout 2

# MPM prefork settings — deliberately low for DoS demonstration
# With only 10 workers, a flood will exhaust the pool quickly
<IfModule mpm_prefork_module>
    StartServers          2
    MinSpareServers       2
    MaxSpareServers       5
    MaxRequestWorkers    10
    MaxConnectionsPerChild 200
</IfModule>

# Also limit event MPM in case it's loaded instead
<IfModule mpm_event_module>
    StartThreads          2
    MinSpareThreads       2
    MaxSpareThreads       5
    ThreadsPerChild       5
    MaxRequestWorkers    10
    MaxConnectionsPerChild 200
</IfModule>

# Mime types
TypesConfig /etc/mime.types
AddType application/x-compress .Z
AddType application/x-gzip .gz .tgz

# Module includes
IncludeOptional mods-enabled/*.load
IncludeOptional mods-enabled/*.conf

# Security headers
<IfModule mod_headers.c>
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</IfModule>

# Ports
Listen 80

# Extended logging format for security analysis
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %T %D %{ratio}n%%" combined_forensic
LogFormat "%h %l %u %t \"%r\" %>s %b" common
LogFormat "%{Referer}i -> %U" referer
LogFormat "%{User-agent}i" agent

# Custom log format with timing for DoS analysis
LogFormat "%h %{%Y-%m-%dT%H:%M:%S}t %m %U%q %H %>s %b %T %D" dos_analysis

# Global access log
CustomLog /var/log/apache2/access.log combined_forensic
ErrorLog /var/log/apache2/error.log
LogLevel warn

# Document root
DocumentRoot "/var/www/html"

<Directory "/var/www/html">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Virtual hosts
IncludeOptional sites-enabled/*.conf

# Apache status module — exposed for Prometheus scraping
<IfModule mod_status.c>
    ExtendedStatus On
    <Location "/server-status">
        SetHandler server-status
        Require ip 172.0.0.0/8
        Require ip 127.0.0.1
    </Location>
    <Location "/server-info">
        SetHandler server-info
        Require ip 172.0.0.0/8
        Require ip 127.0.0.1
    </Location>
</IfModule>
