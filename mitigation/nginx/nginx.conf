# ============================================================
# Nginx Reverse Proxy Configuration — DoS Mitigation
# DoS Lab — Educational Use Only
# ============================================================


worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" $request_time '
                      'rt=$request_time ua="$upstream_addr" '
                      'us="$upstream_status" ut="$upstream_response_time"';

    log_format  security '$remote_addr [$time_local] "$request" '
                         '$status $body_bytes_sent '
                         'limit_req=$limit_req_status';

    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;
    keepalive_requests 100;

    # ── Security Headers ────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Rate Limiting Zones ─────────────────────────────────────
    # General request rate limit: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

    # Aggressive limit for suspected DoS: 5 req/min per IP
    limit_req_zone $binary_remote_addr zone=strict:10m rate=5r/m;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Connection Limit ───────────────────────────────────────
    limit_conn addr 20;
    limit_conn_status 429;

    # ── Request Size Limits ─────────────────────────────────────
    client_body_timeout 10;
    client_header_timeout 10;
    client_max_body_size 1m;
    large_client_header_buffers 2 1k;

    # ── Upstream (Victim Apache) ────────────────────────────────
    upstream victim_apache {
        server victim:80;
        keepalive 32;
    }

    # ── Main Server Block ────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        # ── Block empty User-Agent ────────────────────────────
        if ($http_user_agent = "") {
            return 403 "Forbidden: Empty User-Agent";
        }

        # ── Rate limiting with burst ───────────────────────────
        # Normal traffic: allow burst of 10, then limit to 30/min
        limit_req zone=general burst=10 nodelay;
        limit_req_status 429;

        # ── Health check pass-through ─────────────────────────
        location = /health {
            proxy_pass http://victim_apache;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Main proxy location ───────────────────────────────
        location / {
            proxy_pass http://victim_apache;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;

            # Buffering
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      4 32k;
        }

        # ── Custom error pages ────────────────────────────────
        error_page 429 /rate_limited.html;
        location = /rate_limited.html {
            add_header Content-Type text/html;
            add_header Retry-After 60;
            return 429 '<!DOCTYPE html>
<html><head><title>429 - Rate Limited</title>
<style>body{font-family:sans-serif;background:#0d1b2a;color:#e8eaf6;text-align:center;padding:5rem}
h1{color:#ff5722}p{color:#90caf9}</style></head>
<body><h1>429 Too Many Requests</h1>
<p>Rate limit exceeded. Please wait before retrying.</p>
<p><em>DoS Lab Mitigation — Nginx Rate Limiter Active</em></p></body></html>';
        }
    }
}
